<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sourcing Report — MeLi Nicho</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1A1A2E; --surface: #16213E; --surface2: #0F3460;
    --accent: #FFE600; --text: #E0E0E0; --muted: #7A8499;
  }
  body { background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif; font-size: 15px; line-height: 1.7; }
  header { background: var(--surface); border-bottom: 2px solid var(--accent);
    padding: .9rem 2rem; display: flex; align-items: center;
    justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .logo { font-size: 1.3rem; font-weight: 300; white-space: nowrap; }
  .logo strong { color: var(--accent); font-weight: 800; }
  .meta-chips { display: flex; gap: .5rem; flex-wrap: wrap; flex: 1; }
  .chip { background: var(--surface2); border-radius: 20px; padding: .25rem .85rem;
    font-size: .8rem; color: var(--muted); white-space: nowrap; }
  .chip strong { color: var(--text); }
  .btn-print { background: var(--accent); color: #1A1A2E; border: none; border-radius: 8px;
    padding: .45rem 1.1rem; font-size: .85rem; font-weight: 700; cursor: pointer; }
  .btn-print:hover { opacity: .85; }
  main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
  #loading { display: flex; align-items: center; justify-content: center;
    height: 60vh; color: var(--muted); font-size: 1.1rem; gap: .75rem; }
  h1, h2, h3 { color: var(--accent); margin: 1.5rem 0 .6rem; line-height: 1.3; }
  h1 { font-size: 1.5rem; } h2 { font-size: 1.2rem; } h3 { font-size: 1rem; }
  p { margin: .4rem 0 .8rem; }
  ul, ol { padding-left: 1.4rem; margin: .4rem 0 .8rem; }
  li { margin-bottom: .3rem; }
  strong { color: #fff; }
  table { width: 100%; border-collapse: collapse; margin: 1rem 0 1.5rem; font-size: .88rem; }
  th { background: var(--accent); color: #1A1A2E; font-weight: 700; padding: .55rem .8rem; text-align: left; }
  td { padding: .5rem .8rem; border-bottom: 1px solid var(--surface2); }
  tr:nth-child(even) td { background: rgba(15,52,96,.4); }
  hr { border: none; border-top: 1px solid var(--surface2); margin: 1.5rem 0; }
  code { background: var(--surface2); border-radius: 4px; padding: .1rem .4rem; font-size: .85rem; }
  @media print {
    body { background: #fff; color: #111; }
    header { background: #f5f5f5; border-color: #ccc; }
    .btn-print { display: none; }
    .logo strong, h1, h2, h3 { color: #333; }
    td, th { border-color: #ccc; } th { background: #eee; color: #111; }
  }
</style>
</head>
<body>
<header>
  <div class="logo">⚡ MeLi <strong>Nicho</strong> — Reporte de Sourcing</div>
  <div class="meta-chips" id="meta-chips"></div>
  <button class="btn-print" onclick="window.print()">🖨 Imprimir / PDF</button>
</header>
<main>
  <div id="loading">⏳ Analizando con IA, aguardá unos segundos…</div>
  <div id="report" style="display:none"></div>
</main>
<script>
function render() {
    const raw = localStorage.getItem('sourcing_report_data');
    if (!raw) return;
    try {
        const { html, chips } = JSON.parse(raw);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('report').innerHTML = html;
        document.getElementById('report').style.display = 'block';
        if (chips) document.getElementById('meta-chips').innerHTML = chips;
        localStorage.removeItem('sourcing_report_data');
    } catch(e) {}
}

render();
window.addEventListener('storage', e => {
    if (e.key === 'sourcing_report_data') render();
});
</script>
</body>
</html>
